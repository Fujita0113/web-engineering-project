{% extends "base.html" %}
{% block title %}Authors{% endblock %}
{% block content %}
<h2>Authors</h2>
<ul class="author-list">
  {% for author in authors %}
    <li><a href="{% url 'blog:posts_by_author' %}?author={{ author.username }}">{{ author }}</a></li>
  {% empty %}
    <li>No authors yet.</li>
  {% endfor %}
</ul>
{% endblock %}

{% extends "base.html" %}
{% block title %}All posts{% endblock %}
{% block content %}
<h2>All posts (newest first)</h2>
<ul>
  {% for post in posts %}
    <li>
      {{ post.created_at|date:"Y-m-d" }} &mdash; <strong>{{ post.title }}</strong>
      by <a href="{% url 'blog:posts_by_author' %}?author={{ post.author.username }}">{{ post.author }}</a>
    </li>
  {% empty %}
    <li>No posts yet.</li>
  {% endfor %}
</ul>
{% endblock %}

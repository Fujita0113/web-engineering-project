{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}The Blogs{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="container">
      <h1><a href="{% url 'blog:post_list' %}">The Blogs</a></h1>
      <nav class="site-nav" aria-label="Primary">
        <ul>
          <li><a href="{% url 'blog:post_list' %}">All posts</a></li>
          <li><a href="{% url 'blog:author_list' %}">Authors</a></li>
          <li><a href="{% url 'blog:posts_by_author' %}">Search by author</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main id="main" class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
